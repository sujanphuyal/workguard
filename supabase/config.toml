# Supabase local development config — link to remote with: supabase link --project-ref <ref>
project_id = "workguard"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "workguard://auth/callback"
additional_redirect_urls = ["workguard://auth/callback", "exp://127.0.0.1:8081/--/auth/callback"]

[auth.email]
enable_signup = true
enable_confirmations = false
